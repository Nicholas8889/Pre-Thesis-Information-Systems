<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="930" viewBox="0 0 1600 930" role="img" aria-labelledby="title desc">
  <title id="title">Account Receivables - State Machine Diagram</title>
  <desc id="desc">Receivable status is derived from Invoice and Payment data</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#233044"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="28" y="28" width="1544" height="874" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="800" y="68" text-anchor="middle" class="title">Account Receivables - State Machine Diagram</text>
  <text x="800" y="98" text-anchor="middle" class="subtitle">Receivable status is derived from Invoice and Payment data</text>
  <style>
    .title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 15px Arial, sans-serif; fill: #64748b; }
    .state { fill: #dff3fc; stroke: #1677a8; stroke-width: 2.4; filter: url(#shadow); }
    .state-title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
    .state-subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
    .transition { fill: none; stroke: #233044; stroke-width: 2.2; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }
    .transition-soft { fill: none; stroke: #64748b; stroke-width: 1.9; marker-end: url(#arrow); stroke-linejoin: round; }
    .label-bg { fill: #ffffff; fill-opacity: 0.94; stroke: #e2e8f0; stroke-width: 1; }
    .label { font: 500 14px Consolas, "Courier New", monospace; fill: #172033; }
    .group { fill: #f8fbfd; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 8 6; }
    .group-title { font: 700 15px Arial, sans-serif; fill: #475569; }
    .note { fill: #fff8d8; stroke: #d6a700; stroke-width: 1.6; }
    .note-text { font: 500 14px Arial, sans-serif; fill: #443a14; }
    .terminal-label { font: 600 13px Arial, sans-serif; fill: #475569; }
  </style>
  
    <rect class="group" x="145" y="145" width="770" height="650" rx="24"/>
    <text class="group-title" x="170" y="177">Open Receivable</text>
    <circle cx="85" cy="455" r="13" fill="#0f172a"/>
    <g>
    <rect class="state" x="180" y="411" width="190" height="88" rx="22"/>
    <text class="state-title" x="275" y="462" text-anchor="middle">Unpaid</text>
    
  </g>
    <g>
    <rect class="state" x="555" y="226" width="200" height="88" rx="22"/>
    <text class="state-title" x="655" y="277" text-anchor="middle">Partial</text>
    
  </g>
    <g>
    <rect class="state" x="555" y="596" width="200" height="88" rx="22"/>
    <text class="state-title" x="655" y="647" text-anchor="middle">Overdue</text>
    
  </g>
    <g>
    <rect class="state" x="1025" y="226" width="190" height="88" rx="22"/>
    <text class="state-title" x="1120" y="277" text-anchor="middle">Paid</text>
    
  </g>
    <g>
    <rect class="state" x="1025" y="596" width="190" height="88" rx="22"/>
    <text class="state-title" x="1120" y="647" text-anchor="middle">Cancelled</text>
    
  </g>
    <g>
    <circle cx="1480" cy="455" r="17" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <circle cx="1480" cy="455" r="10" fill="#0f172a"/>
    <text class="terminal-label" x="1480" y="491" text-anchor="middle">Closed</text>
  </g>

    <path class="transition" d="M 98 455 L 180 455"/><g>
    <rect class="label-bg" x="55.41000000000001" y="408.5" width="169.17999999999998" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="140" y="430">generateInvoice()</tspan></text>
  </g>
    <path class="transition" d="M 370 430 L 555 292"/><g>
    <rect class="label-bg" x="325.63" y="304" width="288.73999999999995" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="470" y="325.5">recordPayment(amount)</tspan><tspan x="470" y="344.5">[0 &lt; amount &lt; remainingBalance]</tspan></text>
  </g>
    <path class="transition" d="M 370 470 L 555 618"/><g>
    <rect class="label-bg" x="362.06" y="539" width="211.88" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="468" y="560.5">dueDatePassed()</tspan><tspan x="468" y="579.5">[remainingBalance &gt; 0]</tspan></text>
  </g>
    <path class="transition" d="M 755 270 L 1025 270"/><g>
    <rect class="label-bg" x="758.44" y="209" width="263.12" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="890" y="230.5">recordPayment(amount)</tspan><tspan x="890" y="249.5">[amount == remainingBalance]</tspan></text>
  </g>
    <path class="transition" d="M 655 314 L 655 596"/><g>
    <rect class="label-bg" x="639.06" y="474" width="211.88" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="745" y="495.5">dueDatePassed()</tspan><tspan x="745" y="514.5">[remainingBalance &gt; 0]</tspan></text>
  </g>
    <path class="transition" d="M 755 618 L 1028 300"/><g>
    <rect class="label-bg" x="948.44" y="429" width="263.12" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1080" y="450.5">recordPayment(amount)</tspan><tspan x="1080" y="469.5">[amount == remainingBalance]</tspan></text>
  </g>
    <path class="transition" d="M 370 420 L 445 420 L 445 125 L 1120 125 L 1120 226"/><g>
    <rect class="label-bg" x="988.44" y="139" width="263.12" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1120" y="160.5">recordPayment(amount)</tspan><tspan x="1120" y="179.5">[amount == remainingBalance]</tspan></text>
  </g>
    <path class="transition" d="M 570 226 L 528 168 L 782 168 L 740 226"/><g>
    <rect class="label-bg" x="510.63" y="124" width="288.73999999999995" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="655" y="145.5">recordPayment(amount)</tspan><tspan x="655" y="164.5">[0 &lt; amount &lt; remainingBalance]</tspan></text>
  </g>
    <path class="transition" d="M 570 684 L 528 742 L 782 742 L 740 684"/><g>
    <rect class="label-bg" x="510.63" y="739" width="288.73999999999995" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="655" y="760.5">recordPayment(amount)</tspan><tspan x="655" y="779.5">[0 &lt; amount &lt; remainingBalance]</tspan></text>
  </g>
    <path class="transition-soft" d="M 915 695 L 1025 660"/><g>
    <rect class="label-bg" x="890.95" y="698.5" width="152.1" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="967" y="720">cancelInvoice()</tspan></text>
  </g>
    <path class="transition" d="M 1215 270 L 1365 270 L 1365 438 L 1463 448"/><g>
    <rect class="label-bg" x="1280.41" y="218.5" width="169.17999999999998" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1365" y="240">closeReceivable()</tspan></text>
  </g>
    <path class="transition" d="M 1215 640 L 1365 640 L 1365 472 L 1463 462"/><g>
    <rect class="label-bg" x="1280.41" y="658.5" width="169.17999999999998" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1365" y="680">closeReceivable()</tspan></text>
  </g>
    <g>
    <rect class="note" x="1020" y="770" width="460" height="64" rx="10"/>
    <text class="note-text"><tspan x="1034" y="795">Cancelled is retained because it exists in InvoiceStatus.</tspan><tspan x="1034" y="815">The current application still needs an explicit cancel action.</tspan></text>
  </g>
  
</svg>