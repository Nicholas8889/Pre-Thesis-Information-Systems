<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Billing Follow Up - State Machine Diagram</title>
  <desc id="desc">Need Billing is a Receivable condition, not a state of a Billing Follow Up record</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#233044"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="28" y="28" width="1344" height="724" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="700" y="68" text-anchor="middle" class="title">Billing Follow Up - State Machine Diagram</text>
  <text x="700" y="98" text-anchor="middle" class="subtitle">Need Billing is a Receivable condition, not a state of a Billing Follow Up record</text>
  <style>
    .title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 15px Arial, sans-serif; fill: #64748b; }
    .state { fill: #dff3fc; stroke: #1677a8; stroke-width: 2.4; filter: url(#shadow); }
    .state-title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
    .state-subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
    .transition { fill: none; stroke: #233044; stroke-width: 2.2; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }
    .transition-soft { fill: none; stroke: #64748b; stroke-width: 1.9; marker-end: url(#arrow); stroke-linejoin: round; }
    .label-bg { fill: #ffffff; fill-opacity: 0.94; stroke: #e2e8f0; stroke-width: 1; }
    .label { font: 500 14px Consolas, "Courier New", monospace; fill: #172033; }
    .group { fill: #f8fbfd; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 8 6; }
    .group-title { font: 700 15px Arial, sans-serif; fill: #475569; }
    .note { fill: #fff8d8; stroke: #d6a700; stroke-width: 1.6; }
    .note-text { font: 500 14px Arial, sans-serif; fill: #443a14; }
    .terminal-label { font: 600 13px Arial, sans-serif; fill: #475569; }
  </style>
  
    <circle cx="90" cy="390" r="13" fill="#0f172a"/>
    <g>
    <rect class="state" x="305" y="346" width="220" height="88" rx="22"/>
    <text class="state-title" x="415" y="397" text-anchor="middle">Planned</text>
    
  </g>
    <g>
    <rect class="state" x="800" y="191" width="200" height="88" rx="22"/>
    <text class="state-title" x="900" y="242" text-anchor="middle">Done</text>
    
  </g>
    <g>
    <rect class="state" x="800" y="501" width="200" height="88" rx="22"/>
    <text class="state-title" x="900" y="552" text-anchor="middle">Cancelled</text>
    
  </g>
    <g>
    <circle cx="1270" cy="390" r="17" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <circle cx="1270" cy="390" r="10" fill="#0f172a"/>
    <text class="terminal-label" x="1270" y="426" text-anchor="middle">Closed</text>
  </g>

    <path class="transition" d="M 103 390 L 305 390"/><g>
    <rect class="label-bg" x="17.930000000000007" y="314" width="374.14" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="205" y="335.5">createBilling()</tspan><tspan x="205" y="354.5">or generateInvoice() [paymentTerm=CREDIT]</tspan></text>
  </g>
    <path class="transition" d="M 525 370 L 800 260"/><g>
    <rect class="label-bg" x="610.3" y="268.5" width="109.39999999999999" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="665" y="290">markDone()</tspan></text>
  </g>
    <path class="transition" d="M 525 410 L 800 520"/><g>
    <rect class="label-bg" x="588.95" y="483.5" width="152.1" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="665" y="505">cancelBilling()</tspan></text>
  </g>
    <path class="transition" d="M 1000 235 L 1150 235 L 1150 375 L 1253 385"/><g>
    <rect class="label-bg" x="1063.22" y="183.5" width="143.56" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1135" y="205">closeBilling()</tspan></text>
  </g>
    <path class="transition" d="M 1000 545 L 1150 545 L 1150 405 L 1253 395"/><g>
    <rect class="label-bg" x="1063.22" y="563.5" width="143.56" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1135" y="585">closeBilling()</tspan></text>
  </g>
    <g>
    <rect class="note" x="305" y="610" width="640" height="64" rx="10"/>
    <text class="note-text"><tspan x="319" y="635">When the deadline is near or overdue, the system sends an Admin notification.</tspan><tspan x="319" y="655">The Billing Follow Up remains Planned until it is marked Done or Cancelled.</tspan></text>
  </g>
    <g>
    <rect class="note" x="995" y="650" width="300" height="64" rx="10"/>
    <text class="note-text"><tspan x="1009" y="675">System change required:</tspan><tspan x="1009" y="695">add actions to mark Done or Cancelled.</tspan></text>
  </g>
  
</svg>