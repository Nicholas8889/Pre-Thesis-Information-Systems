<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="760" viewBox="0 0 1480 760" role="img" aria-labelledby="title desc">
  <title id="title">Login / Authentication Session - State Machine Diagram</title>
  <desc id="desc">Models the persistent authentication state, including success, failure, logout, and expiry</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#233044"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="28" y="28" width="1424" height="704" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="740" y="68" text-anchor="middle" class="title">Login / Authentication Session - State Machine Diagram</text>
  <text x="740" y="98" text-anchor="middle" class="subtitle">Models the persistent authentication state, including success, failure, logout, and expiry</text>
  <style>
    .title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 15px Arial, sans-serif; fill: #64748b; }
    .state { fill: #dff3fc; stroke: #1677a8; stroke-width: 2.4; filter: url(#shadow); }
    .state-title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
    .state-subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
    .transition { fill: none; stroke: #233044; stroke-width: 2.2; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }
    .transition-soft { fill: none; stroke: #64748b; stroke-width: 1.9; marker-end: url(#arrow); stroke-linejoin: round; }
    .label-bg { fill: #ffffff; fill-opacity: 0.94; stroke: #e2e8f0; stroke-width: 1; }
    .label { font: 500 14px Consolas, "Courier New", monospace; fill: #172033; }
    .group { fill: #f8fbfd; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 8 6; }
    .group-title { font: 700 15px Arial, sans-serif; fill: #475569; }
    .note { fill: #fff8d8; stroke: #d6a700; stroke-width: 1.6; }
    .note-text { font: 500 14px Arial, sans-serif; fill: #443a14; }
    .terminal-label { font: 600 13px Arial, sans-serif; fill: #475569; }
  </style>
  
    <circle cx="80" cy="390" r="13" fill="#0f172a"/>
    <g>
    <rect class="state" x="180" y="346" width="210" height="88" rx="22"/>
    <text class="state-title" x="285" y="397" text-anchor="middle">Logged Out</text>
    
  </g>
    <g>
    <rect class="state" x="605" y="346" width="230" height="88" rx="22"/>
    <text class="state-title" x="720" y="397" text-anchor="middle">Authenticating</text>
    
  </g>
    <g>
    <rect class="state" x="1075" y="346" width="230" height="88" rx="22"/>
    <text class="state-title" x="1190" y="397" text-anchor="middle">Authenticated</text>
    
  </g>

    <path class="transition" d="M 93 390 L 180 390"/><g>
    <rect class="label-bg" x="50.41000000000001" y="338.5" width="169.17999999999998" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="135" y="360">openApplication()</tspan></text>
  </g>
    <path class="transition" d="M 390 390 L 605 390"/><g>
    <rect class="label-bg" x="330.01" y="333.5" width="339.97999999999996" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="500" y="355">submitCredentials(username, password)</tspan></text>
  </g>
    <path class="transition" d="M 835 390 L 1075 390"/><g>
    <rect class="label-bg" x="814.9" y="299.5" width="280.2" height="71" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="955" y="321">credentialsChecked()</tspan><tspan x="955" y="340">[valid and user.status=Active]</tspan><tspan x="955" y="359">/ createSession()</tspan></text>
  </g>
    <path class="transition" d="M 720 434 L 720 575 L 285 575 L 285 434"/><g>
    <rect class="label-bg" x="313.66" y="594" width="382.67999999999995" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="505" y="615.5">credentialsChecked() [invalid or inactive]</tspan><tspan x="505" y="634.5">/ displayError()</tspan></text>
  </g>
    <path class="transition" d="M 1190 346 L 1190 200 L 285 200 L 285 346"/><g>
    <rect class="label-bg" x="603.44" y="134" width="263.12" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="735" y="155.5">logout() or sessionExpired()</tspan><tspan x="735" y="174.5">/ destroySession()</tspan></text>
  </g>
    <g>
    <rect class="note" x="1010" y="555" width="350" height="64" rx="10"/>
    <text class="note-text"><tspan x="1024" y="580">The session cookie expires after 8 hours.</tspan><tspan x="1024" y="600">A failed login returns to Logged Out.</tspan></text>
  </g>
  
</svg>