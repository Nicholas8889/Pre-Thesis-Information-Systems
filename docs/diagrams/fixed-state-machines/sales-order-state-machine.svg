<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1120" viewBox="0 0 1760 1120" role="img" aria-labelledby="title desc">
  <title id="title">Sales Order - State Machine Diagram</title>
  <desc id="desc">Order status and approval status are shown together only where both belong to the same SalesOrder</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#233044"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="28" y="28" width="1704" height="1064" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="880" y="68" text-anchor="middle" class="title">Sales Order - State Machine Diagram</text>
  <text x="880" y="98" text-anchor="middle" class="subtitle">Order status and approval status are shown together only where both belong to the same SalesOrder</text>
  <style>
    .title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 15px Arial, sans-serif; fill: #64748b; }
    .state { fill: #dff3fc; stroke: #1677a8; stroke-width: 2.4; filter: url(#shadow); }
    .state-title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
    .state-subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
    .transition { fill: none; stroke: #233044; stroke-width: 2.2; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }
    .transition-soft { fill: none; stroke: #64748b; stroke-width: 1.9; marker-end: url(#arrow); stroke-linejoin: round; }
    .label-bg { fill: #ffffff; fill-opacity: 0.94; stroke: #e2e8f0; stroke-width: 1; }
    .label { font: 500 14px Consolas, "Courier New", monospace; fill: #172033; }
    .group { fill: #f8fbfd; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 8 6; }
    .group-title { font: 700 15px Arial, sans-serif; fill: #475569; }
    .note { fill: #fff8d8; stroke: #d6a700; stroke-width: 1.6; }
    .note-text { font: 500 14px Arial, sans-serif; fill: #443a14; }
    .terminal-label { font: 600 13px Arial, sans-serif; fill: #475569; }
  </style>
  
    <circle cx="80" cy="530" r="13" fill="#0f172a"/>
    <g>
    <rect class="state" x="215" y="206" width="250" height="98" rx="22"/>
    <text class="state-title" x="340" y="250" text-anchor="middle">Draft</text>
    <text class="state-subtitle" x="340" y="275" text-anchor="middle">approvalStatus = Pending</text>
  </g>
    <g>
    <rect class="state" x="230" y="486" width="220" height="88" rx="22"/>
    <text class="state-title" x="340" y="525" text-anchor="middle">Confirmed</text>
    <text class="state-subtitle" x="340" y="550" text-anchor="middle">approvalStatus = NotRequired</text>
  </g>
    <g>
    <rect class="state" x="795" y="486" width="210" height="88" rx="22"/>
    <text class="state-title" x="900" y="537" text-anchor="middle">Invoiced</text>
    
  </g>
    <g>
    <rect class="state" x="795" y="211" width="210" height="88" rx="22"/>
    <text class="state-title" x="900" y="250" text-anchor="middle">Cancelled</text>
    <text class="state-subtitle" x="900" y="275" text-anchor="middle">approvalStatus = Rejected</text>
  </g>
    <g>
    <rect class="state" x="1230" y="486" width="200" height="88" rx="22"/>
    <text class="state-title" x="1330" y="537" text-anchor="middle">Shipped</text>
    
  </g>
    <g>
    <circle cx="1650" cy="530" r="17" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <circle cx="1650" cy="530" r="10" fill="#0f172a"/>
    <text class="terminal-label" x="1650" y="566" text-anchor="middle">Completed</text>
  </g>
    <g>
    <circle cx="900" cy="985" r="17" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <circle cx="900" cy="985" r="10" fill="#0f172a"/>
    <text class="terminal-label" x="900" y="1021" text-anchor="middle">Deleted</text>
  </g>

    <path class="transition" d="M 93 520 L 205 285"/><g>
    <rect class="label-bg" x="57.31000000000003" y="349" width="425.37999999999994" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="270" y="370.5">createSalesOrder()</tspan><tspan x="270" y="389.5">[role=Sales and risk is Late/Historically Late]</tspan></text>
  </g>
    <path class="transition" d="M 93 530 L 230 530"/><g>
    <rect class="label-bg" x="32.71000000000001" y="459" width="254.57999999999998" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="160" y="480.5">createSalesOrder()</tspan><tspan x="160" y="499.5">[role=Sales and risk=Clean]</tspan></text>
  </g>
    <path class="transition" d="M 93 542 L 165 820 L 760 820 L 795 562"/><g>
    <rect class="label-bg" x="297.09000000000003" y="759" width="305.82" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="450" y="780.5">createSalesOrder() [role=Manager]</tspan><tspan x="450" y="799.5">/ generateInvoice()</tspan></text>
  </g>
    <path class="transition" d="M 465 275 L 795 500"/><g>
    <rect class="label-bg" x="474.17" y="334" width="271.65999999999997" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="610" y="355.5">approveOrder() [role=Manager]</tspan><tspan x="610" y="374.5">/ generateInvoice()</tspan></text>
  </g>
    <path class="transition" d="M 465 255 L 795 255"/><g>
    <rect class="label-bg" x="558.22" y="194" width="143.56" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="630" y="215.5">rejectOrder()</tspan><tspan x="630" y="234.5">[role=Manager]</tspan></text>
  </g>
    <path class="transition" d="M 450 530 L 795 530"/><g>
    <rect class="label-bg" x="493.44" y="469" width="263.12" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="625" y="490.5">generateInvoice()</tspan><tspan x="625" y="509.5">[role=Admin or role=Manager]</tspan></text>
  </g>
    <path class="transition" d="M 1005 530 L 1230 530"/><g>
    <rect class="label-bg" x="970.63" y="469" width="288.73999999999995" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1115" y="490.5">markShipped()</tspan><tspan x="1115" y="509.5">[deliveryNote.status=Delivered]</tspan></text>
  </g>
    <path class="transition" d="M 1430 530 L 1633 530"/><g>
    <rect class="label-bg" x="1428.33" y="469" width="203.33999999999997" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1530" y="490.5">completeOrder()</tspan><tspan x="1530" y="509.5">[invoice.status=Paid]</tspan></text>
  </g>
    <path class="transition" d="M 1005 255 L 1510 255 L 1510 505 L 1633 520"/><g>
    <rect class="label-bg" x="1286.76" y="203.5" width="126.47999999999999" height="33" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1350" y="225">closeOrder()</tspan></text>
  </g>

    <path class="transition-soft" d="M 400 304 L 520 360 L 520 895 L 883 968"/>
    <path class="transition-soft" d="M 340 574 L 340 895 L 883 978"/>
    <path class="transition-soft" d="M 900 574 L 900 968"/><g>
    <rect class="label-bg" x="907.2" y="819" width="365.59999999999997" height="52" rx="7"/>
    <text class="label" text-anchor="middle"><tspan x="1090" y="840.5">deleteSalesOrder()</tspan><tspan x="1090" y="859.5">[not Paid, not Delivered, not Cancelled]</tspan></text>
  </g>
    <g>
    <rect class="note" x="180" y="930" width="520" height="64" rx="10"/>
    <text class="note-text"><tspan x="194" y="955">Deletion is allowed from Draft, Confirmed, or Invoiced</tspan><tspan x="194" y="975">only while the transaction is not paid, delivered, or cancelled.</tspan></text>
  </g>
    <g>
    <rect class="note" x="1180" y="930" width="460" height="64" rx="10"/>
    <text class="note-text"><tspan x="1194" y="955">Implementation alignment needed:</tspan><tspan x="1194" y="975">the application currently does not persist status = Shipped.</tspan></text>
  </g>
  
</svg>