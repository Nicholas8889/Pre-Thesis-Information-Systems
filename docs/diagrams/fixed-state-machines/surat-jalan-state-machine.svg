<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Surat Jalan - State Machine Diagram</title>
  <desc id="desc">Corrected delivery note lifecycle aligned with the current creation and eligibility rules.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#233044"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.13"/></filter>
  </defs>
  <style>
    .title { font: 700 29px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 15px Arial, sans-serif; fill: #64748b; }
    .state { fill: #dff3fc; stroke: #1677a8; stroke-width: 2.5; filter: url(#shadow); }
    .state-title { font: 700 21px Arial, sans-serif; fill: #0f172a; }
    .transition { fill: none; stroke: #233044; stroke-width: 2.3; marker-end: url(#arrow); stroke-linejoin: round; stroke-linecap: round; }
    .label-bg { fill: #fff; fill-opacity: .95; stroke: #e2e8f0; stroke-width: 1; }
    .label { font: 500 14px Consolas, "Courier New", monospace; fill: #172033; }
    .note { fill: #fff8d8; stroke: #d6a700; stroke-width: 1.6; }
    .note-text { font: 500 14px Arial, sans-serif; fill: #443a14; }
    .terminal { font: 600 13px Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="28" y="28" width="1384" height="764" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text id="visible-title" class="title" x="720" y="70" text-anchor="middle">Surat Jalan - State Machine Diagram</text>
  <text class="subtitle" x="720" y="100" text-anchor="middle">Corrected lifecycle based on current payment eligibility and delivery status</text>

  <circle cx="90" cy="410" r="13" fill="#0f172a"/>
  <g><rect class="state" x="320" y="365" width="220" height="90" rx="23"/><text class="state-title" x="430" y="417" text-anchor="middle">Issued</text></g>
  <g><rect class="state" x="780" y="205" width="210" height="90" rx="23"/><text class="state-title" x="885" y="257" text-anchor="middle">Delivered</text></g>
  <g><rect class="state" x="780" y="525" width="210" height="90" rx="23"/><text class="state-title" x="885" y="577" text-anchor="middle">Cancelled</text></g>
  <g><circle cx="1280" cy="410" r="17" fill="#fff" stroke="#0f172a" stroke-width="3"/><circle cx="1280" cy="410" r="10" fill="#0f172a"/><text class="terminal" x="1280" y="447" text-anchor="middle">Closed</text></g>

  <path class="transition" d="M 103 410 L 320 410"/><g><rect class="label-bg" x="93" y="300.5" width="244" height="79" rx="8"/><text class="label" text-anchor="middle"><tspan x="215" y="324">createDeliveryNote()</tspan><tspan x="215" y="345">[paymentTerm=CREDIT</tspan><tspan x="215" y="366"> or invoice.status=Paid]</tspan></text></g>
  <path class="transition" d="M 540 390 L 780 275"/><g><rect class="label-bg" x="573.5" y="276.5" width="163" height="37" rx="8"/><text class="label" text-anchor="middle"><tspan x="655" y="300">markDelivered()</tspan></text></g>
  <path class="transition" d="M 540 430 L 780 545"/><g><rect class="label-bg" x="551" y="506.5" width="208" height="37" rx="8"/><text class="label" text-anchor="middle"><tspan x="655" y="530">cancelDeliveryNote()</tspan></text></g>
  <path class="transition" d="M 990 250 L 1125 250 L 1125 395 L 1263 405"/><g><rect class="label-bg" x="1015.5" y="196.5" width="199" height="37" rx="8"/><text class="label" text-anchor="middle"><tspan x="1115" y="220">closeDeliveryNote()</tspan></text></g>
  <path class="transition" d="M 990 570 L 1125 570 L 1125 425 L 1263 415"/><g><rect class="label-bg" x="1015.5" y="586.5" width="199" height="37" rx="8"/><text class="label" text-anchor="middle"><tspan x="1115" y="610">closeDeliveryNote()</tspan></text></g>

  <g><rect class="note" x="315" y="665" width="810" height="72" rx="10"/><text class="note-text"><tspan x="330" y="692">Draft exists in the current enum, but creation saves a new Surat Jalan directly as Issued.</tspan><tspan x="330" y="715">The corrected workflow removes unrestricted backward status changes.</tspan></text></g>
</svg>